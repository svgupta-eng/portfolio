<!DOCTYPE html>
<html lang="en">
<head>
    <script type="module" src="../global.js"></script>
    <link rel="stylesheet" href="../style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
</head>
<body>
    <h1>Contact</h1>
    <form action="mailto:svgupta@ucsd.edu" method="POST" enctype="text/plain">
        
        <label>
            Email:
            <input type="email" name="email">
        </label>

        <label>
            Subject:
            <input name="subject">
        </label>

        <label>
            Message:
            <textarea name="body"></textarea>
        </label>

        <button>Send Message</button>

    </form>
    
</body>
</html>
